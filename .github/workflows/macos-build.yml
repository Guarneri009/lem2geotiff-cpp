name: macOS Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: build (macos-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-14
            triplet: arm64-osx
          - arch: x64
            runner: macos-13
            triplet: x64-osx

    env:
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-cache

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Create vcpkg cache directory
      run: mkdir -p ${{ github.workspace }}/vcpkg-cache

    - name: Install system dependencies
      run: |
        brew install cmake ninja pkg-config autoconf autoconf-archive automake libtool

    - name: Cache vcpkg packages
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/vcpkg-cache
          vcpkg_installed
        key: vcpkg-macos-${{ matrix.arch }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          vcpkg-macos-${{ matrix.arch }}-

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: '1ee2e9d2920ba96be0b02c09915dd3c6d17fb50e'
        runVcpkgInstall: true

    - name: Configure CMake
      run: |
        cmake -B build \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
          -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} \
          -DENABLE_CUDA=OFF

    - name: Build
      run: |
        cmake --build build --config Release

    - name: Check executable
      run: |
        echo "=== File info ==="
        ls -lh build/lem2geotiff_cpp
        echo ""
        echo "=== Dependencies (otool) ==="
        otool -L build/lem2geotiff_cpp || true
        echo ""
        echo "=== File type ==="
        file build/lem2geotiff_cpp
        echo ""
        echo "=== Architecture ==="
        lipo -info build/lem2geotiff_cpp

    - name: Test executable
      run: |
        echo "=== Testing executable ==="
        ./build/lem2geotiff_cpp --help
        echo "Executable runs successfully!"

    - name: Prepare artifacts
      run: |
        echo "=== Preparing artifacts ==="

        mkdir -p artifacts

        # Copy executable
        cp build/lem2geotiff_cpp artifacts/

        # Copy GDAL data files from vcpkg_installed
        VCPKG_INSTALLED="vcpkg_installed/${{ matrix.triplet }}"

        if [ -d "$VCPKG_INSTALLED/share/gdal" ]; then
          cp -r "$VCPKG_INSTALLED/share/gdal" artifacts/gdal-data
          echo "Copied GDAL data files"
        fi

        # Copy PROJ data files from vcpkg_installed
        if [ -d "$VCPKG_INSTALLED/share/proj" ]; then
          cp -r "$VCPKG_INSTALLED/share/proj" artifacts/proj-data
          echo "Copied PROJ data files"
        fi

        # Copy documentation
        [ -f README.md ] && cp README.md artifacts/
        [ -f LICENSE ] && cp LICENSE artifacts/

        echo ""
        echo "=== Final artifacts summary ==="
        echo "Executable:"
        ls -lh artifacts/lem2geotiff_cpp
        echo ""
        echo "Total size:"
        du -sh artifacts/

    - name: Upload build logs
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-logs-macos-${{ matrix.arch }}
        path: |
          build/**/*.log

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lem2geotiff-cpp-macos-${{ matrix.arch }}
        path: artifacts/
        retention-days: 30

    - name: Create Release Archive
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        cd artifacts
        tar -czvf ../lem2geotiff-cpp-macos-${{ matrix.arch }}.tar.gz *

    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: lem2geotiff-cpp-macos-${{ matrix.arch }}.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
